# Specification-only example for the dedicated `nativas` Hermes profile.
# Replace absolute-path placeholders locally. Keep credentials outside git.

platform_toolsets:
  api_server:
    - delegation
    - nativas_kb
    - nativas_ops

delegation:
  max_iterations: 2
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: false
  subagent_auto_approve: false
  inherit_mcp_toolsets: false

mcp_servers:
  nativas_kb:
    command: node
    args:
      - /ABSOLUTE/PATH/TO/NATIVAS/apps/kb-mcp/src/gbrain-proxy.mjs
    env:
      GBRAIN_HOME: /ABSOLUTE/PATH/TO/NATIVAS_RUNTIME/gbrain
    tools:
      include:
        - search
        - query
        - get_page
        - think
      resources: false
      prompts: false

  nativas_ops:
    command: node
    args:
      - /ABSOLUTE/PATH/TO/NATIVAS/apps/relay/dist/mcp.js
    tools:
      include:
        - capture_site
        - search_market_evidence
        - submit_report
      resources: false
      prompts: false
